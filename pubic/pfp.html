<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    .back {
      position: absolute;
      color: white;
      top: 10px;
      font-size: 26px;
      font-weight: bolder;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle,
          #E50914 0%,
          #141414 60%,
          #000000 100%);
    }

    .profile-container {
      text-align: center;
    }

    .profile-pic {
      width: 300px;
      height: 300px;
      border-radius: 50%;
      object-fit: cover;
      border: 5px solid #222;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }

    .name {
      margin-top: 15px;
      font-size: 18px;
      font-weight: bold;
      color: #ffffff;
    }

    .x {
      color: #ffffff;
      font-size: 20px;
    }
  </style>
</head>

<body>
  <a href="/"><span class="back">
      ←
    </span></a>

  <div class="profile-container">
    <img src="assets/pfp.jpg" alt="BJB STU" class="profile-pic">

    <div class="name" id="address"></div>
    <br><br>
    <center>
      <marquee><b class="x">NETFLIX USER</b></marquee>
    </center>

  </div>
  <script>
    let emailAdd = localStorage.getItem("email")
    document.getElementById("address").innerText = emailAdd;
  </script>
</body>

</html>
